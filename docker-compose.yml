# docker-compose.yml — GigShield local development stack
# Starts all 4 backend services + infrastructure (Postgres, Redis, RabbitMQ)
# Usage: docker compose up --build

version: "3.9"

services:

  # -- Infrastructure ---------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (admin/admin)
    environment:
      RABBITMQ_DEFAULT_USER: gigshield
      RABBITMQ_DEFAULT_PASS: secret

  # -- Services ---------------------------------------
  api-gateway:
    build: ./services/api-gateway
    ports: ["8000:8000"]   # public-facing port
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8001
      INSURANCE_CORE_URL:   http://insurance-core:8002
      INTELLIGENCE_SERVICE_URL: http://intelligence-service:8003
      PLATFORM_SERVICE_URL: http://platform-service:8004
    depends_on: [identity-service, insurance-core, intelligence-service, platform-service]

  identity-service:
    build: ./services/identity-service
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql+asyncpg://gigshield:secret@postgres:5432/gigshield
      REDIS_URL:    redis://redis:6379/0
      RABBITMQ_URL: amqp://gigshield:secret@rabbitmq:5672/
      JWT_SECRET_KEY: dev-secret-change-in-prod
    depends_on: [postgres, redis, rabbitmq]

  insurance-core:
    build: ./services/insurance-core
    ports: ["8002:8002"]
    environment:
      DATABASE_URL: postgresql+asyncpg://gigshield:secret@postgres:5432/gigshield
      REDIS_URL:    redis://redis:6379/1
      RABBITMQ_URL: amqp://gigshield:secret@rabbitmq:5672/
    depends_on: [postgres, redis, rabbitmq]

  intelligence-service:
    build: ./services/intelligence-service
    ports: ["8003:8003"]
    environment:
      DATABASE_URL: postgresql+asyncpg://gigshield:secret@postgres:5432/gigshield
      REDIS_URL:    redis://redis:6379/2
      RABBITMQ_URL: amqp://gigshield:secret@rabbitmq:5672/
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY:-mock}
      CPCB_API_KEY: ${CPCB_API_KEY:-mock}
    depends_on: [postgres, redis, rabbitmq]

  platform-service:
    build: ./services/platform-service
    ports: ["8004:8004"]
    environment:
      DATABASE_URL: postgresql+asyncpg://gigshield:secret@postgres:5432/gigshield
      REDIS_URL:    redis://redis:6379/3
      RABBITMQ_URL: amqp://gigshield:secret@rabbitmq:5672/
      MSG91_API_KEY: ${MSG91_API_KEY:-mock}
    depends_on: [postgres, redis, rabbitmq]

  # -- Frontends --------------------------------------
  worker-app:
    build: ./frontend/worker-app
    ports: ["3000:80"]

  admin-dashboard:
    build: ./frontend/admin-dashboard
    ports: ["3001:80"]

volumes:
  postgres_data:
